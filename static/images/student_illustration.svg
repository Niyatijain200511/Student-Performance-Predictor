<svg width="480" height="420" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">

    <!-- Background circle -->
    <circle cx="240" cy="210" r="190" fill="#EAF1FB"/>

    <!-- Desk -->
    <rect x="90" y="300" width="300" height="18" rx="4" fill="#1E5AA8"/>
    <rect x="110" y="318" width="14" height="60" fill="#164987"/>
    <rect x="356" y="318" width="14" height="60" fill="#164987"/>

    <!-- Laptop -->
    <rect x="190" y="250" width="100" height="66" rx="6" fill="#0F3D75"/>
    <rect x="198" y="258" width="84" height="48" rx="3" fill="#DCE6F5"/>
    <rect x="178" y="298" width="124" height="10" rx="3" fill="#1E5AA8"/>

    <!-- Small chart on laptop screen -->
    <rect x="208" y="288" width="6" height="12" fill="#1E5AA8"/>
    <rect x="220" y="282" width="6" height="18" fill="#1E5AA8"/>
    <rect x="232" y="276" width="6" height="24" fill="#1E5AA8"/>
    <rect x="244" y="270" width="6" height="30" fill="#1E5AA8"/>
    <rect x="256" y="264" width="6" height="36" fill="#1E5AA8"/>

    <!-- Stack of books beside laptop -->
    <rect x="310" y="278" width="60" height="14" rx="2" fill="#1E5AA8"/>
    <rect x="314" y="264" width="52" height="14" rx="2" fill="#3B82F6"/>
    <rect x="318" y="250" width="44" height="14" rx="2" fill="#164987"/>

    <!-- Coffee mug -->
    <rect x="130" y="270" width="26" height="24" rx="4" fill="#ffffff" stroke="#1E5AA8" stroke-width="3"/>
    <path d="M156 276 Q170 276 170 286 Q170 296 156 296" fill="none" stroke="#1E5AA8" stroke-width="3"/>

    <!-- Student body -->
    <ellipse cx="240" cy="150" rx="34" ry="36" fill="#FDD7B5"/>

    <!-- Hair -->
    <path d="M206 140 Q206 98 240 98 Q274 98 274 140 Q274 118 240 116 Q206 118 206 140 Z" fill="#3B2A20"/>

    <!-- Body / shirt -->
    <path d="M180 250 Q180 190 240 186 Q300 190 300 250 Z" fill="#1E5AA8"/>

    <!-- Collar detail -->
    <path d="M224 190 L240 210 L256 190" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arms resting on desk -->
    <rect x="196" y="230" width="20" height="55" rx="10" fill="#1E5AA8"/>
    <rect x="264" y="230" width="20" height="55" rx="10" fill="#1E5AA8"/>
    <circle cx="206" cy="280" r="11" fill="#FDD7B5"/>
    <circle cx="274" cy="280" r="11" fill="#FDD7B5"/>

    <!-- Simple face -->
    <circle cx="226" cy="150" r="3.5" fill="#2D2D2D"/>
    <circle cx="254" cy="150" r="3.5" fill="#2D2D2D"/>
    <path d="M228 164 Q240 172 252 164" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Floating graduation cap icon, top right -->
    <g transform="translate(340, 70)">
        <path d="M0 10 L34 0 L68 10 L34 20 Z" fill="#0F3D75"/>
        <path d="M12 15 V32 Q34 42 56 32 V15" fill="none" stroke="#0F3D75" stroke-width="3"/>
        <circle cx="66" cy="12" r="2.5" fill="#0F3D75"/>
        <line x1="66" y1="12" x2="66" y2="30" stroke="#0F3D75" stroke-width="2"/>
    </g>

    <!-- Floating pencil icon, top left -->
    <g transform="translate(60, 90) rotate(-25)">
        <rect x="0" y="0" width="14" height="70" rx="3" fill="#3B82F6"/>
        <path d="M0 0 L7 -16 L14 0 Z" fill="#FDD7B5"/>
        <rect x="0" y="52" width="14" height="10" fill="#164987"/>
    </g>

</svg>